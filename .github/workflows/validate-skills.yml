name: Validate Skills

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill validation
        run: python3 scripts/validate_skills.py

      - name: Install uv
        run: python3 -m pip install uv

      - name: Run tests
        run: make test
